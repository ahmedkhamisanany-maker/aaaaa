<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <title>ActionBox | Register</title>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div style="background: #0a0a0f; padding: 40px; border-radius: 15px; border: 2px solid #00d4ff; box-shadow: 0 0 20px #00d4ff; width: 400px; text-align: center;">
        <h2 style="color: #ff0000; font-family: 'Orbitron';">REGISTER</h2>
        <form>
            <input type="text" placeholder="Full Name" required style="width: 100%; padding: 10px; margin: 8px 0; background: #111; border: 1px solid #ff0000; color: white; border-radius: 5px;">
            <input type="email" placeholder="Email" required style="width: 100%; padding: 10px; margin: 8px 0; background: #111; border: 1px solid #ff0000; color: white; border-radius: 5px;">
            <input type="password" placeholder="Password" required style="width: 100%; padding: 10px; margin: 8px 0; background: #111; border: 1px solid #ff0000; color: white; border-radius: 5px;">
            <button type="submit" class="btn-watch" style="width: 100%; border: none; cursor: pointer; background: #00d4ff; box-shadow: 0 0 10px #00d4ff;">Join Now</button>
        </form>
    </div>
</body>
</html>
