<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Search Movies</title>
</head>
<body>
    <div class="container" style="text-align: center;">
        <h2 style="color: #ff0000; font-family: 'Orbitron'; letter-spacing: 3px;">SEARCH DATABASE</h2>
        <div style="max-width: 600px; margin: 30px auto;">
            <input type="text" placeholder="Type movie name..." style="width: 80%; padding: 15px; border-radius: 30px 0 0 30px; border: 2px solid #00d4ff; background: #000; color: white; outline: none;">
            <button style="width: 15%; padding: 15px; border-radius: 0 30px 30px 0; border: 2px solid #00d4ff; background: #00d4ff; color: black; font-weight: bold; cursor: pointer;">Go</button>
        </div>
        <div class="movie-grid" style="margin-top: 50px;">
            <p style="color: #666;">Enter a keyword to see results...</p>
        </div>
    </div>
</body>
</html>
